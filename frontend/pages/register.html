<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | SnapMart</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-card">
        <a class="brand auth-brand" href="../index.html">
          <span class="brand-mark">S</span>
          <span>SnapMart</span>
        </a>
        <span class="eyebrow">Join the local marketplace</span>
        <h1>Create your SnapMart account</h1>
        <p>
          Register as a customer, vendor, or administrator to start using the
          platform.
        </p>
        <form class="auth-form">
          <label>
            Full name
            <input type="text" placeholder="Your name" required />
          </label>
          <label>
            Email
            <input type="email" placeholder="you@example.com" required />
          </label>
          <label>
            Role
            <select required>
              <option value="">Select role</option>
              <option value="customer">Customer</option>
              <option value="vendor">Vendor</option>
              <option value="admin">Admin</option>
            </select>
          </label>
          <label>
            Password
            <input type="password" placeholder="Create a password" required />
          </label>
          <button class="primary-btn" type="submit">Create Account</button>
        </form>
        <p class="auth-switch">
          Already registered? <a href="./login.html">Login here</a>
        </p>
      </section>
    </main>
  </body>
</html>
