<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendor Dashboard | SnapMart</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html" aria-label="SnapMart home">
        <span class="brand-mark">S</span>
        <span>SnapMart</span>
      </a>
      <button class="menu-toggle" type="button" aria-label="Toggle navigation">
        Menu
      </button>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="./products.html">Products</a>
        <a href="./orders.html">Orders</a>
        <a href="./vendor-dashboard.html">Vendor</a>
        <a href="./login.html">Login</a>
      </nav>
      <a class="header-action" href="./register.html">Join SnapMart</a>
    </header>

    <main>
      <section class="page-hero">
        <span class="eyebrow">Vendor dashboard</span>
        <h1>Manage inventory, orders, and daily shop activity.</h1>
        <p>
          Track storefront performance, review recent customer orders, and keep
          product inventory visible for local shoppers.
        </p>
      </section>

      <section class="features-section dashboard-metrics" data-vendor-metrics></section>

      <section class="section-block dashboard-layout">
        <div>
          <div class="section-heading">
            <span class="eyebrow">Inventory</span>
            <h2>Product stock</h2>
          </div>
          <div class="vendor-products" data-vendor-products></div>
        </div>
        <aside>
          <div class="section-heading">
            <span class="eyebrow">Fulfillment</span>
            <h2>Recent orders</h2>
          </div>
          <div class="vendor-orders" data-vendor-orders></div>
        </aside>
      </section>
    </main>

    <script src="../js/main.js"></script>
    <script src="../js/catalog-data.js"></script>
    <script src="../js/vendor-dashboard.js"></script>
  </body>
</html>
